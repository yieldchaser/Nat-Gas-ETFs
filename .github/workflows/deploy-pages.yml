name: Deploy to GitHub Pages

on:
  # Fires when the data pipeline or flows workflow completes.
  # NOTE: GITHUB_TOKEN pushes (from scheduled workflows) cannot trigger
  # other workflows via the normal `push` event — `workflow_run` is the
  # correct mechanism to chain them.
  workflow_run:
    workflows:
      - "Update Dashboard Data"
      - "Update Flows Data"
    types:
      - completed
  # Also fire on direct pushes to main that touch docs/ (code/template changes
  # pushed by a developer will still land here).
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
